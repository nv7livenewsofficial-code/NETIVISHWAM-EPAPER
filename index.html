<div id="user-tools" class="tool-bar shadow-sm">
    <div class="tool-item" onclick="toggleCropMode()">
        <span class="tool-icon">✂️</span><span>CROP</span>
    </div>
    <div class="tool-item" onclick="downloadHD()">
        <span class="tool-icon">💾</span><span>SAVE HD</span>
    </div>
    <div class="tool-item" onclick="shareToWA()">
        <span class="tool-icon">📲</span><span>SHARE</span>
    </div>
    <div class="tool-item" onclick="react('like')">
        <span class="tool-icon">👍</span><span id="like-count">0</span>
    </div>
    <div class="tool-item" onclick="react('dislike')">
        <span class="tool-icon">👎</span><span id="dislike-count">0</span>
    </div>
</div>

<div id="admin-panel" class="d-none bg-dark text-white p-3">
    <h6>Admin Control: <span id="admin-name"></span></h6>
    <button class="btn btn-warning btn-sm" onclick="showUploadModal()">Upload New Page</button>
    <button class="btn btn-info btn-sm" onclick="startMapping()">Map News Areas (10 Items)</button>
</div>

<div class="epaper-display text-center">
    <div id="image-wrapper" style="position: relative; display: inline-block;">
        <img id="active-page" src="default.jpg" class="img-fluid">
        <div id="mapping-layer"></div>
    </div>
</div>
