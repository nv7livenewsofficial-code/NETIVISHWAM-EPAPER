<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETIVISHWAM EPAPER - Professional Editions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="epaper-header shadow-sm text-center py-3">
        <h1 class="logo-text">నేటివిశ్వం</h1>
        <p class="edition-date" id="currentDate"></p>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="location.reload()">🏠 HOME</a>
            <div id="authLinks">
                <button class="btn btn-outline-warning btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">Admin Login</button>
            </div>
            <div id="userLinks" class="d-none">
                <button class="btn btn-warning btn-sm me-2" onclick="showUploadPanel()">Upload Edition</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="upload-panel" class="d-none mb-5">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white"><h5>Publish New Edition</h5></div>
                <div class="card-body">
                    <input type="file" id="fileInput" class="form-control mb-3" accept="image/*">
                    
                    <div class="img-preview-box text-center p-3 border rounded bg-light">
                        <img id="rawImagePreview" style="max-height: 400px; display: none;">
                        <p class="text-muted" id="noImageText">Select an image to see preview</p>
                    </div>

                    <button class="btn btn-info w-100 mt-3 fw-bold text-white" id="openCropModal" style="display: none;" data-bs-toggle="modal" data-bs-target="#cropModal">
                        🔧 OPEN CROPPING TOOL
                    </button>

                    <input type="text" id="editionName" class="form-control mt-3" placeholder="Enter Edition Name (e.g., Hyderabad)">
                    <button class="btn btn-success w-100 py-3 mt-3 fw-bold" id="publishBtn" disabled onclick="publishEdition()">PUBLISH NOW</button>
                </div>
            </div>
        </div>

        <div id="home-section">
            <div class="row g-4" id="edition-grid"></div>
        </div>
    </div>

    <div class="modal fade" id="cropModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header bg-dark text-white">
                    <h5>🔧 Professional Crop Tool</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="cropper-container">
                        <img id="imageToCrop">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-warning fw-bold" onclick="finalizeCrop()">APPLY HD CROP</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header bg-dark text-white"><h5>Admin Login</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body p-4 text-start">
                    <label class="small fw-bold">Gmail ID</label>
                    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="masoodv6.in@gmail.com">
                    <label class="small fw-bold">Password</label>
                    <input type="password" id="loginPass" class="form-control mb-3">
                    <button class="btn btn-primary w-100 fw-bold" onclick="handleLogin()">Login</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
