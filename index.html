<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETIVISHWAM EPAPER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="epaper-header">
        <h1 class="logo-text">NETIVISHWAM</h1>
    </header>

    <nav class="user-toolbar shadow-sm">
        <div class="tool-action" onclick="initCrop()">
            <span class="icon">✂️</span><br>CROP
        </div>
        <div class="tool-action" onclick="saveHD()">
            <span class="icon">💾</span><br>SAVE HD
        </div>
        <div class="tool-action" onclick="shareWA()">
            <span class="icon">📲</span><br>SHARE
        </div>
        <div class="tool-action" onclick="updateReaction()">
            <span class="icon">👍</span><br><span id="count">0</span>
        </div>
    </nav>

    <div id="admin-panel" class="admin-bar d-none">
        <button class="btn btn-warning btn-sm fw-bold" onclick="document.getElementById('fileIn').click()">UPLOAD PAGE</button>
        <button class="btn btn-light btn-sm fw-bold" onclick="mapAreas()">MAP 10 NEWS AREAS</button>
        <input type="file" id="fileIn" class="d-none" accept="image/*">
    </div>

    <main class="main-viewer">
        <div class="canvas-box" id="wrapper">
            <img id="paper-img" src="placeholder.jpg">
            <div id="mapping-layer"></div>
        </div>
    </main>

    <footer class="footer-area">
        <button class="btn btn-link btn-sm text-secondary" onclick="handleAuth()">Admin Login</button>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
