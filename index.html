<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETIVISHWAM - నేటివిశ్వం</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="brand-header text-center">
        <h1 class="telugu-logo">నేటివిశ్వం</h1>
    </header>

    <nav class="user-interaction-bar shadow-sm">
        <div class="nav-tool" onclick="toggleCropTool()">
            <span class="tool-emoji">✂️</span><br>CROP
        </div>
        <div class="nav-tool" onclick="downloadHD()">
            <span class="tool-emoji">💾</span><br>SAVE HD
        </div>
        <div class="nav-tool" onclick="shareToWhatsApp()">
            <span class="tool-emoji">📲</span><br>SHARE
        </div>
        <div class="nav-tool" onclick="handleLike()">
            <span class="tool-emoji">👍</span><br><span id="count-display">0</span>
        </div>
    </nav>

    <div id="admin-panel" class="admin-strip d-none text-center">
        <button class="btn btn-warning btn-sm fw-bold mx-2" onclick="triggerFileUpload()">UPLOAD</button>
        <button class="btn btn-light btn-sm fw-bold" onclick="startNewsMapping()">MAP 10 ITEMS</button>
        <input type="file" id="imageInput" class="d-none" accept="image/*">
    </div>

    <main class="e-paper-viewer">
        <div class="image-box-wrapper" id="paper-frame">
            <img id="main-epaper-image" src="your-paper.jpg" alt="Daily Edition">
            <div id="mapping-overlay"></div>
        </div>
    </main>

    <footer class="p-3 text-center">
        <button class="btn btn-sm btn-link text-decoration-none text-secondary" onclick="adminAuth()">Admin Login</button>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
