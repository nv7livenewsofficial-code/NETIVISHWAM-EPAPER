<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETIVISHWAM EPAPER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="epaper-header text-center">
        <h1 class="logo-text">NETIVISHWAM</h1>
    </header>

    <nav class="user-toolbar shadow-sm">
        <div class="tool-item" onclick="startCrop()">
            <span class="icon">✂️</span><br>CROP
        </div>
        <div class="tool-item" onclick="downloadHD()">
            <span class="icon">💾</span><br>SAVE HD
        </div>
        <div class="tool-item" onclick="shareWhatsApp()">
            <span class="icon">📲</span><br>SHARE
        </div>
        <div class="tool-item" onclick="likePost()">
            <span class="icon">👍</span><br><span id="like-count">0</span>
        </div>
    </nav>

    <div id="admin-panel" class="admin-controls d-none">
        <button class="btn btn-warning btn-sm fw-bold" onclick="document.getElementById('fileInput').click()">UPLOAD PAGE</button>
        <button class="btn btn-light btn-sm fw-bold" onclick="initMapping()">MAP 10 NEWS AREAS</button>
        <input type="file" id="fileInput" class="d-none" accept="image/*">
    </div>

    <main class="viewer-container">
        <div class="paper-wrapper" id="canvas-wrapper">
            <img id="epaper-image" src="placeholder.jpg" alt="Daily News">
            <div id="mapping-layer"></div>
        </div>
    </main>

    <footer class="footer-login text-center">
        <button class="btn btn-link btn-sm text-secondary text-decoration-none" onclick="adminLogin()">Admin Login</button>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
