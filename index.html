<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETIVISHWAM EPAPER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏠 NETIVISHWAM</a>
            
            <div id="authLinks">
                <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
            </div>

            <div id="userLinks" class="d-none align-items-center">
                <span id="userNameDisplay" class="text-white me-3 small fw-bold"></span>
                <button class="btn btn-warning btn-sm me-2" onclick="location.reload()">Back</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="upload-section" class="d-none mb-5">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white d-flex justify-content-between">
                    <h5 class="mb-0">Publish News</h5>
                    <button class="btn btn-light btn-sm" onclick="location.reload()">Close Panel</button>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-7 border-end">
                            <input type="file" id="fileInput" class="form-control mb-3" accept="image/*">
                            <div class="img-container bg-light border"><img id="cropImage" style="max-width: 100%;"></div>
                            <button class="btn btn-warning mt-3 w-100 fw-bold" onclick="startCrop()">Apply HD Crop</button>
                        </div>
                        <div class="col-md-5">
                            <input type="text" id="newsTitle" class="form-control mb-3" placeholder="Enter News Title">
                            <select id="newsCat" class="form-select mb-3">
                                <option>Politics</option><option>Sports</option><option>Local</option>
                            </select>
                            <button class="btn btn-success w-100 py-2 fw-bold" onclick="saveNews()">Publish Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="home-section">
            <h4 class="mb-4">Latest News</h4>
            <div class="row g-4" id="news-grid"></div>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Member Sign In</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-start">
                    <label class="small fw-bold">Gmail ID</label>
                    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="masoodv6.in@gmail.com">
                    <label class="small fw-bold">Password</label>
                    <input type="password" id="loginPass" class="form-control mb-3" placeholder="Password">
                    <button class="btn btn-primary w-100 fw-bold" onclick="handleLogin()">Login</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
